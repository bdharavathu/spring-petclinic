apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: petclinic-db
  namespace: petclinic
spec:
  provider: azure
  parameters:
    usePodIdentity: "false"
    useVMManagedIdentity: "false"
    clientID: "<workload-identity-client-id>" # app's federated user-assigned identity
    keyvaultName: "<key-vault-name>"
    tenantId: "<tenant-id>"
    objects: |
      array:
        - |
          objectName: petclinic-db-username
          objectType: secret
        - |
          objectName: petclinic-db-password
          objectType: secret
  # project into a native Secret the app reads via secretKeyRef
  secretObjects:
    - secretName: petclinic-db
      type: Opaque
      data:
        - objectName: petclinic-db-username
          key: username
        - objectName: petclinic-db-password
          key: password
