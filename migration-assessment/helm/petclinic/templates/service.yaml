apiVersion: v1
kind: Service
metadata:
  name: petclinic
  namespace: {{ .Release.Namespace }}
  labels: {{- include "petclinic.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector: {{- include "petclinic.selectorLabels" . | nindent 4 }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
