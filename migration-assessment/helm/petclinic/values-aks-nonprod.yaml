# AKS non-production overlay. Image from ACR, managed Postgres, no in-cluster DB.
replicaCount: 2

image:
  repository: acrpetclinic.azurecr.io/petclinic
  tag: nonprod
  pullPolicy: IfNotPresent

postgres:
  enabled: false

ingress:
  enabled: true
  className: nginx
  host: petclinic.nonprod.example.com
  tls:
    enabled: true
    secretName: petclinic-tls

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6

pdb:
  enabled: true
  minAvailable: 1

database:
  host: pg-petclinic-nonprod.postgres.database.azure.com
  port: 5432
  name: petclinic
  params: "?sslmode=require"
  existingSecret: petclinic-db   # synced from Key Vault via Secret Store CSI
